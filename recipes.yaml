# Recipe registry — language-agnostic. Used by scripts/validate and scripts/smoke.
#
# Fields:
#   id          — folder name under recipes/
#   type        — sdk | agent | automation
#   lang        — python (default) | go | typescript (future)
#   live        — smoke | aws | agent | omit for no live run
#   entrypoint  — path to main script relative to recipe dir
#   pass_output — success string for SDK smoke (type: sdk)
#   success_pattern — success string for agent smoke (type: agent)
#   env_required — extra env vars for live smoke
#   workflow_examples, review_example — automation only

recipes:
  - id: gateway-allowlist
    type: sdk
    lang: python
    entrypoint: run.py
    pass_output: "PASS: gateway-allowlist"
    live: smoke

  - id: docker-compose-fastapi-postgres
    type: sdk
    lang: python
    entrypoint: run.py
    pass_output: "PASS: docker-compose-fastapi-postgres"
    live: smoke

  - id: playwright
    type: sdk
    lang: python
    entrypoint: run.py
    pass_output: "PASS: playwright"
    live: smoke

  - id: mount-s3
    type: sdk
    lang: python
    entrypoint: run.py
    pass_output: "PASS: mount-s3"
    live: aws

  - id: anthropic-claude-code-in-sandbox
    type: agent
    lang: python
    entrypoint: anthropic_claude_code_in_sandbox/main.py
    success_pattern: "Done."
    live: agent
    env_required: [ANTHROPIC_API_KEY]

  - id: openai-codex-in-sandbox
    type: agent
    lang: python
    entrypoint: openai_codex_in_sandbox/main.py
    success_pattern: "Done."
    live: agent
    env_required: [OPENAI_API_KEY]

  - id: claude-agent-sdk-in-sandbox
    type: agent
    lang: python
    entrypoint: claude_agent_sdk_in_sandbox/main.py
    success_pattern: "Done."
    live: agent
    env_required: [ANTHROPIC_API_KEY]

  - id: islo-reviewer
    type: automation
    workflow_examples:
      - examples/islo-review.yml
      - examples/islo-babysit.yml
    review_example: examples/REVIEW.md
