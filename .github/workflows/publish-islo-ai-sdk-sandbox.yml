name: Publish islo-ai-sdk-sandbox

on:
  workflow_dispatch:
  push:
    tags:
      - "islo-ai-sdk-sandbox-v*"

concurrency:
  group: publish-islo-ai-sdk-sandbox
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipes/ai-sdk-harness-chat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check -w @islo-labs/islo-ai-sdk-sandbox

      - name: Build
        run: npm run build -w @islo-labs/islo-ai-sdk-sandbox

      - name: Publish to npm
        run: npm publish -w @islo-labs/islo-ai-sdk-sandbox --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
