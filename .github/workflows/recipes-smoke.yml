name: Recipes smoke

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      recipe:
        description: Recipe id, group (sdk/agents/all), or mount-s3
        required: true
        default: sdk
        type: choice
        options:
          - sdk
          - agents
          - all
          - gateway-allowlist
          - docker-compose-fastapi-postgres
          - playwright
          - mount-s3
          - anthropic-claude-code-in-sandbox
          - openai-codex-in-sandbox
          - claude-agent-sdk-in-sandbox

concurrency:
  group: recipes-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ISLO_BASE_URL: ${{ vars.ISLO_BASE_URL }}
      ISLO_API_KEY: ${{ secrets.ISLO_API_KEY }}
      ISLO_RECIPES_REPO_URL: https://github.com/${{ github.repository }}
      ISLO_RECIPES_REF: ${{ github.ref_name }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ISLO_IAM_READY: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run live smoke tests
        run: |
          SELECTION="${{ github.event.inputs.recipe }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SELECTION="sdk"
          fi
          case "$SELECTION" in
            sdk)
              uv run pytest tests/test_smoke_live.py -v -m "live and not live_aws and not live_agent"
              ;;
            agents)
              uv run pytest tests/test_smoke_live.py -v -m live_agent
              ;;
            all)
              uv run pytest tests/test_smoke_live.py -v -m live
              ;;
            *)
              uv run pytest tests/test_smoke_live.py -v -k "$SELECTION"
              ;;
          esac
