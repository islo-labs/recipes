name: Recipes smoke

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      recipe:
        description: Recipe id (or "all")
        required: true
        default: all
        type: choice
        options:
          - all
          - gateway-allowlist
          - docker-compose-fastapi-postgres
          - playwright
          - mount-s3

concurrency:
  group: recipes-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ISLO_BASE_URL: ${{ vars.ISLO_BASE_URL }}
      ISLO_API_KEY: ${{ secrets.ISLO_API_KEY }}
      ISLO_RECIPES_REPO_URL: https://github.com/${{ github.repository }}
      ISLO_RECIPES_REF: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3

      - name: Run gateway-allowlist
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.recipe == 'all' ||
          github.event.inputs.recipe == 'gateway-allowlist'
        run: cd recipes/gateway-allowlist && uv sync && uv run python run.py

      - name: Run docker-compose-fastapi-postgres
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.recipe == 'all' ||
          github.event.inputs.recipe == 'docker-compose-fastapi-postgres'
        run: cd recipes/docker-compose-fastapi-postgres && uv sync && uv run python run.py

      - name: Run playwright
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.recipe == 'all' ||
          github.event.inputs.recipe == 'playwright'
        run: cd recipes/playwright && uv sync && uv run python run.py

      - name: Run mount-s3 (manual only)
        if: github.event.inputs.recipe == 'mount-s3'
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          ISLO_IAM_READY: "1"
        run: cd recipes/mount-s3 && uv sync && uv run python run.py
